{{ define "update.html" }}
{{ template "header" . }}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm bg-white">
            <h4 class="mb-4 fw-bold text-warning">✏️ Filmi Düzenle</h4>
            
            <div class="text-center mb-4 d-none" id="posterPreviewContainer">
                <label class="form-label d-block fw-semibold text-muted mb-2">Mevcut Film Afişi</label>
                <img src="" id="posterPreview" class="rounded shadow-sm" style="max-height: 200px; object-fit: cover; border: 2px solid #ffc107;">
            </div>

            <form id="updateForm" class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Film Adı</label>
                    <input type="text" class="form-control" id="title" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Film Afiş Linki (URL)</label>
                    <input type="url" class="form-control" id="poster" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Tür</label>
                    <input type="text" class="form-control" id="genre" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Yönetmen</label>
                    <input type="text" class="form-control" id="director" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Yayın Yılı</label>
                    <input type="number" class="form-control" id="year" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">IMDb Puanı</label>
                    <input type="number" step="0.1" max="10" class="form-control" id="rating" required>
                </div>
                <div class="col-12 mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2">💾 Değişiklikleri Kaydet</button>
                    <a href="/" class="btn btn-secondary w-50 fw-bold py-2">İptal</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/static/js/update.js"></script>
{{ template "header" . }}
{{ end }}
