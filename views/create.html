{{ template "header" . }}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm bg-white">
            <h4 class="mb-4 fw-bold text-success">✨ Yeni Film Ekle</h4>
            <form id="createForm" class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Film Adı</label>
                    <input type="text" class="form-control" id="title" placeholder="Örn: Inception" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Film Afiş Linki (URL)</label>
                    <input type="url" class="form-control" id="poster" placeholder="https://site.com/afis.jpg" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Tür</label>
                    <input type="text" class="form-control" id="genre" placeholder="Aksiyon, Bilim Kurgu" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Yönetmen</label>
                    <input type="text" class="form-control" id="director" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Yayın Yılı</label>
                    <input type="number" class="form-control" id="year" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">IMDb Puanı</label>
                    <input type="number" step="0.1" max="10" class="form-control" id="rating" placeholder="8.5" required>
                </div>
                <div class="col-12 mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2">💾 Arşive Kaydet</button>
                    <a href="/" class="btn btn-secondary w-50 fw-bold py-2">Geri Dön</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/static/js/create.js"></script>
{{ template "footer" . }}
